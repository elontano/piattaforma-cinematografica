syntax = "proto3";

option java_package = "it.unical.dimes.protocol";
option java_multiple_files = true; //ci permette di creare per ogni message un file .java separato

service UserService{
  rpc Login(UserRequest) returns (UserResponse);
  rpc Register(UserRequest) returns (UserResponse);
}

service FilmService{
  rpc SearchFilms(SearchFilmRequest) returns (FilmListResponse);
  rpc Create(CreateFilmRequest) returns (FilmDTO);
  rpc Update(FilmDTO) returns (OperationResponse);
  rpc Delete(FilmIdRequest) returns (OperationResponse);
}

message UserRequest{
  string username = 1;
  string password = 2;
}

message UserResponse{
  int32 user_id = 1;
  string username = 2;
  bool success = 3;
  string message = 4;
}

message FilmDTO{
  int32 id = 1; //in Create ignoro l'id che poi verra assegnato dal DB.
  int32 user_id = 2;
  string title = 3;
  string director = 4;
  string genre = 5;
  int32 year_of_release = 6;
  int32 rating = 7;
  ViewingStatusDTO viewing_status = 8;
}

message CreateFilmRequest{
  int32 user_id = 1;
  string title = 2;
  string director = 3;
  string genre = 4;
  int32 year_of_release = 5;
  int32 rating = 6;
  ViewingStatusDTO viewing_status = 7;
}

message SearchFilmRequest{
  //Se sono vuoti i campi si ignorano
  int32 user_id = 1;
  optional string title = 2;
  optional string director = 3;
  optional string genre = 4;
  optional uint32 year_of_release = 5;
  optional ViewingStatusDTO viewing_status = 6;

  optional SortByDTO sort_by = 7;
  optional bool sort_ascending = 8; //true asc, false disc

  //implementare sistema di paginazione in futuro
}

message FilmListResponse{
  repeated FilmDTO film_list = 1;
}

message OperationResponse{
  bool valid = 1; //true operazione riuscita
  string message = 2; //messaggio di errore o conferma
}

message FilmIdRequest{
  int32 id = 1;
  int32 user_id = 2;
}

enum SortByDTO{
  NONE = 0; //valore di default
  TITLE = 1;
  YEAR = 2;
  RATING = 3;
}

enum ViewingStatusDTO {
  UNKNOWN_STATUS = 0;//per eventuali errori, lo stato di visione deve essere sempre specificato
  TO_WATCH = 1; //stato di visione di default
  WATCHING = 2;
  WATCHED = 3;
}
