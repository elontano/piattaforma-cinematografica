syntax = "proto3";

option java_package = "it.unical.dimes.protocol";
option java_multiple_files = true; //ci permette di creare per ogni message un file .java separato

service CatalogService{
  rpc SearchFilms(SearchFilmRequest) returns (FilmListResponse);
  rpc Create(FilmDTO) returns (OperationResponse);
  rpc Update(FilmDTO) returns (OperationResponse);
  rpc Delete(FilmIdRequest) returns (OperationResponse);
}

message FilmDTO{
  uint32 id = 1;
  string title = 2;
  string director = 3;
  string genre = 4;
  uint32 year_of_release = 5;
  uint32 rating = 6;
  ViewingStatusDTO viewing_status = 7;
}

message SearchFilmRequest{
  //Se sono vuoti i campi si ignorano
  optional string title = 1;
  optional string director = 2;
  optional string genre = 3;
  optional uint32 year_of_release = 4;
  optional ViewingStatusDTO viewing_status = 5;

  optional SortByDTO sort_by = 6;
  optional bool sort_ascending = 7; //true asc, false disc
}

  enum SortByDTO{
    NONE = 0; //valore di default
    TITLE = 1;
    YEAR = 2;
    RATING = 3;
  }

  enum ViewingStatusDTO {
    UNKNOWN_STATUS = 0;//per eventuali errori, lo stato di visione deve essere sempre specificato
    TO_WATCH = 1; //stato di visione di default
    WATCHING = 2;
    WATCHED = 3;
  }

message FilmListResponse{
  repeated FilmDTO filmList = 1;
}

message OperationResponse{
  bool valid = 1; //true operazione riuscita
  string message = 2; //messaggio di errore o conferma
}

message FilmIdRequest{
  uint32 id = 1;
}